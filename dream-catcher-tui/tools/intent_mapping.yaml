# Intent Mapping Configuration
# Maps nDPI application names to intent categories
#
# Categories:
#   1. Conversational Real-time - Human-to-human communication (video/voice calls)
#   2. Interactive Workflows - Real-time collaboration, AI-assisted workflows
#   3. Interactive Entertainment - Gaming, live streams, AR/VR
#   4. Buffered Consumption - Media streaming, web browsing, social media
#   5. Background - System services, updates, backups, IoT
#
# Default intent for unmapped applications
default: Background

